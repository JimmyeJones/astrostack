# AstroStack — TrueNAS SCALE "Custom App" / docker compose deployment.
#
# 1. Point the /data volume at a TrueNAS dataset (create one, e.g. tank/astro).
# 2. Inside that dataset the app uses three sub-folders, created automatically:
#       incoming/   ← drop your Seestar target folders here
#       library/    ← organised per-target projects + stacks live here
#       state/      ← config.json + jobs database
# 3. Browse to http://<truenas-ip>:8000
#
# Your data path comes from the ASTRO_DATA variable so upgrades (git pull /
# reset) never overwrite it. Put it in an untracked `.env` at the repo root:
#     echo 'ASTRO_DATA=/mnt/your/dataset' > .env
# then build from the repo root with:
#     docker compose --env-file .env -f docker/docker-compose.yml up -d --build
# (--env-file makes the path unambiguous; run from the repo root so the build
#  context sees ./frontend, ./seestack, ./webapp). Verify the resolved path with:
#     docker compose --env-file .env -f docker/docker-compose.yml config | grep /data

services:
  astrostack:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: astrostack:latest
    container_name: astrostack
    ports:
      - "8000:8000"
    # ProcessPoolExecutor + numpy need a decent /dev/shm for big stacks.
    shm_size: "1gb"
    volumes:
      # Host data path from .env (ASTRO_DATA); falls back to the placeholder
      # below only if you never set it — which is almost certainly wrong.
      - ${ASTRO_DATA:-/mnt/CHANGE_ME/astro}:/data
      # Optional: mount an ASTAP install instead of bundling it in the image.
      # - /mnt/tank/apps/astap:/opt/astap:ro
    environment:
      - ASTROSTACK_DATA=/data
      - ASTROSTACK_CPU_WORKERS=4        # blank/remove to use all cores
      - SEESTACK_ASTAP_PATH=/opt/astap/astap
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=10).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      # Generous start_period + retries so a long, CPU-saturating stack never
      # trips a restart (which would mark the running job "interrupted" and, with
      # auto-stack on, loop). The probe itself is trivial; these just add slack.
      start_period: 120s
      retries: 6
